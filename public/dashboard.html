<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personality Assessment — Dashboard</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 30px;
    }
    .header h1 { font-size: 22px; font-weight: 700; color: var(--primary); }
    .header p { color: var(--muted); font-size: 14px; }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .stat-card .number {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-card .label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--primary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      background: var(--bg);
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: #f1f5f9; }

    .score-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 13px;
      min-width: 40px;
      text-align: center;
    }
    .score-low { background: #fef2f2; color: var(--danger); }
    .score-mid { background: #fffbeb; color: var(--warning); }
    .score-high { background: #f0fdf4; color: var(--success); }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-complete { background: #f0fdf4; color: var(--success); }
    .status-pending { background: #fffbeb; color: var(--warning); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1>Personality Assessment</h1>
      <p>Candidate Assessment Dashboard</p>
    </div>
    <div style="display:flex;gap:10px">
      <a href="/assessment.html" class="btn btn-primary">+ Full Assessment</a>
      <a href="/index.html?mode=quick" class="btn btn-outline" style="text-decoration:none">Quick (Interview Only)</a>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="number" id="totalCount">—</div>
      <div class="label">Total Assessments</div>
    </div>
    <div class="stat-card">
      <div class="number" id="avgScore">—</div>
      <div class="label">Average Score</div>
    </div>
    <div class="stat-card">
      <div class="number" id="highCount">—</div>
      <div class="label">Recommended (75+)</div>
    </div>
    <div class="stat-card">
      <div class="number" id="recentCount">—</div>
      <div class="label">This Month</div>
    </div>
  </div>

  <div class="card">
    <h2>All Candidates</h2>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name, email, or position..." oninput="filterTable()">
    </div>

    <div id="tableContainer">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading candidates...</div>
      </div>
    </div>
  </div>


</div>

<!-- Candidate Modal -->
<div id="candidateModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
  <div style="background:white;border-radius:12px;padding:30px;max-width:750px;width:90%;max-height:85vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:start">
      <div>
        <h3 id="modalName" style="margin-bottom:4px"></h3>
        <span id="modalType" style="display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600"></span>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted)">&times;</button>
    </div>
    <div id="modalDetails" style="color:var(--muted);font-size:14px;margin-bottom:16px"></div>

    <div id="modalScores" style="margin-bottom:16px"></div>

    <!-- Answer Data -->
    <div id="modalAnswers" style="margin-bottom:16px"></div>

    <!-- Send to Gemini -->
    <div id="modalGeminiSection">
      <h4 style="margin-bottom:8px">Send to Gemini</h4>
      <textarea id="modalTranscript" rows="6" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical" placeholder="Paste Zoom transcript here..."></textarea>

      <details style="margin-top:12px">
        <summary style="cursor:pointer;font-weight:600;color:var(--muted);font-size:13px">View/Edit Gemini Prompt</summary>
        <textarea id="modalPrompt" rows="12" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:monospace;resize:vertical;margin-top:8px"></textarea>
        <button class="btn btn-outline" style="margin-top:6px;padding:4px 12px;font-size:12px" onclick="loadPromptPreview()">Refresh Prompt</button>
      </details>

      <div style="display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="sendModalToGemini()">Analyze with Gemini</button>
        <span style="color:var(--muted);font-size:13px">or</span>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="manualScore" min="0" max="100" placeholder="Score" style="width:80px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px">
          <button class="btn btn-outline" onclick="saveManualScore()">Save Manual Score</button>
        </div>
      </div>
    </div>

    <div id="modalStatus" style="margin-top:12px"></div>
    <div id="modalResults" style="margin-top:12px"></div>
  </div>
</div>

<script>
let allCandidates = [];

async function loadCandidates() {
  const container = document.getElementById('tableContainer');

  try {
    const res = await fetch('/api/candidates');
    const data = await res.json();

    if (!data.success && data.error) {
      container.innerHTML = `
        <div class="empty-state">
          <h3>Google Sheets Not Connected</h3>
          <p>Configure your Google Sheets credentials in the <code>.env</code> file to see candidates here.</p>
          <p style="margin-top:16px"><a href="/assessment.html" class="btn btn-primary">Start an Assessment</a></p>
        </div>`;
      return;
    }

    allCandidates = data.candidates || [];

    if (allCandidates.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <h3>No Assessments Yet</h3>
          <p>Click "New Assessment" to evaluate your first candidate.</p>
        </div>`;
      updateStats([]);
      return;
    }

    updateStats(allCandidates);
    renderTable(allCandidates);
  } catch (err) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>Connection Error</h3>
        <p>Could not reach the server. Make sure it's running.</p>
      </div>`;
  }
}

function updateStats(candidates) {
  document.getElementById('totalCount').textContent = candidates.length;

  const scores = candidates.map(c => parseFloat(c.finalScore)).filter(s => !isNaN(s));
  document.getElementById('avgScore').textContent = scores.length
    ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length)
    : '—';

  document.getElementById('highCount').textContent = scores.filter(s => s >= 75).length;

  const now = new Date();
  const thisMonth = candidates.filter(c => {
    if (!c.date) return false;
    const parts = c.date.split('.');
    if (parts.length === 3) {
      return parseInt(parts[1]) === now.getMonth() + 1 && parseInt(parts[2]) === now.getFullYear();
    }
    return false;
  }).length;
  document.getElementById('recentCount').textContent = thisMonth;
}

function renderTable(candidates) {
  const container = document.getElementById('tableContainer');

  const rows = candidates.map(c => {
    const score = parseFloat(c.finalScore);
    const scoreClass = isNaN(score) ? '' : score <= 30 ? 'score-low' : score <= 60 ? 'score-mid' : 'score-high';
    const statusClass = c.status === 'Complete' ? 'status-complete' : 'status-pending';

    const idx = candidates.indexOf(c);
    return `<tr style="cursor:pointer" onclick="openCandidate(${idx})">
      <td>${c.date || '—'}</td>
      <td><strong>${c.name || '—'}</strong></td>
      <td>${c.position || '—'}</td>
      <td><span style="font-size:12px;padding:2px 8px;border-radius:8px;background:${c.type === 'Quick' ? '#fef3c7' : '#dbeafe'};color:${c.type === 'Quick' ? '#92400e' : '#1e40af'}">${c.type || 'Full'}</span></td>
      <td><span class="score-badge ${scoreClass}">${c.finalScore || '—'}</span></td>
      <td>${c.geminiScore ? `<span class="score-badge ${parseFloat(c.geminiScore) <= 30 ? 'score-low' : parseFloat(c.geminiScore) <= 60 ? 'score-mid' : 'score-high'}">${c.geminiScore}</span>` : '—'}</td>
      <td><span class="status-badge ${statusClass}">${c.status || '—'}</span></td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Position</th>
          <th>Type</th>
          <th>Score</th>
          <th>Gemini</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allCandidates.filter(c =>
    (c.name || '').toLowerCase().includes(q) ||
    (c.email || '').toLowerCase().includes(q) ||
    (c.position || '').toLowerCase().includes(q)
  );
  renderTable(filtered);
}

let currentCandidate = null;

function openCandidate(idx) {
  const c = allCandidates[idx];
  currentCandidate = c;
  document.getElementById('modalName').textContent = c.name || c.email;

  // Type badge
  const typeEl = document.getElementById('modalType');
  typeEl.textContent = (c.type || 'Full') === 'Quick' ? 'Quick — Interview Only' : 'Full Assessment';
  typeEl.style.background = c.type === 'Quick' ? '#fef3c7' : '#dbeafe';
  typeEl.style.color = c.type === 'Quick' ? '#92400e' : '#1e40af';

  document.getElementById('modalDetails').innerHTML = `
    ${c.email ? `<div>Email: ${c.email}</div>` : ''}
    ${c.position ? `<div>Position: ${c.position}</div>` : ''}
    ${c.assessor ? `<div>Assessor: ${c.assessor}</div>` : ''}
    ${c.date ? `<div>Date: ${c.date}</div>` : ''}
  `;

  // Scores
  const hasScore = c.finalScore && c.finalScore !== '' && c.finalScore !== '—';
  const hasGemini = c.geminiScore && c.geminiScore !== '';
  let scoresHtml = '';
  if (hasScore) {
    const s = parseFloat(c.finalScore);
    const color = isNaN(s) ? 'var(--muted)' : s <= 30 ? 'var(--danger)' : s <= 60 ? 'var(--warning)' : 'var(--success)';
    scoresHtml += `<div style="display:inline-block;margin-right:20px"><span style="color:var(--muted);font-size:13px">Preliminary</span><div style="font-size:28px;font-weight:700;color:${color}">${c.finalScore}</div></div>`;
  }
  if (hasGemini) {
    const g = parseFloat(c.geminiScore);
    const color = g <= 30 ? 'var(--danger)' : g <= 60 ? 'var(--warning)' : 'var(--success)';
    scoresHtml += `<div style="display:inline-block"><span style="color:var(--muted);font-size:13px">Gemini Score</span><div style="font-size:28px;font-weight:700;color:${color}">${c.geminiScore}</div></div>`;
  }
  document.getElementById('modalScores').innerHTML = scoresHtml;

  // Answer data
  const ad = c.answerData;
  let answersHtml = '';
  if (ad) {
    answersHtml = `<details>
      <summary style="cursor:pointer;font-weight:600;color:var(--muted);font-size:13px">View Answer Sheet Data</summary>
      <div style="margin-top:8px;font-size:13px;background:var(--bg);padding:12px;border-radius:8px;max-height:300px;overflow-y:auto">`;

    if (ad.fc && Object.keys(ad.fc).length) {
      answersHtml += `<div style="margin-bottom:8px"><strong>Forced-Choice Rankings:</strong> ${Object.entries(ad.fc).map(([b, r]) => `Block ${b}: ${Object.entries(r).map(([s,v]) => `${s}=${v}`).join(',')}`).join(' | ')}</div>`;
    }
    if (ad.sjt && Object.keys(ad.sjt).length) {
      answersHtml += `<div style="margin-bottom:8px"><strong>SJT Answers:</strong> ${Object.entries(ad.sjt).map(([s,a]) => `S${s}=${a}`).join(', ')}</div>`;
    }
    if (ad.process && Object.keys(ad.process).length) {
      answersHtml += `<div style="margin-bottom:8px"><strong>Process Checklist:</strong> ${Object.entries(ad.process).map(([p,v]) => `${p}=${v}`).join(', ')}</div>`;
    }
    if (ad.keyPhrases && Object.values(ad.keyPhrases).some(v => v)) {
      answersHtml += `<div style="margin-bottom:8px"><strong>Notes:</strong> ${Object.entries(ad.keyPhrases).filter(([,v]) => v).map(([f,v]) => `${f}: "${v}"`).join(' | ')}</div>`;
    }
    if (ad.redFlags?.length) answersHtml += `<div style="margin-bottom:8px"><strong>Red Flags:</strong> ${ad.redFlags.join(', ')}</div>`;
    if (ad.greenFlags?.length) answersHtml += `<div style="margin-bottom:8px"><strong>Green Flags:</strong> ${ad.greenFlags.join(', ')}</div>`;
    if (ad.notes) answersHtml += `<div><strong>Additional Notes:</strong> ${ad.notes}</div>`;

    answersHtml += `</div></details>`;
  }
  document.getElementById('modalAnswers').innerHTML = answersHtml;

  // Show/hide Gemini section
  document.getElementById('modalGeminiSection').style.display = hasGemini ? 'none' : 'block';
  document.getElementById('modalTranscript').value = '';
  document.getElementById('modalPrompt').value = '';
  document.getElementById('modalStatus').innerHTML = '';
  document.getElementById('modalResults').innerHTML = '';

  document.getElementById('candidateModal').style.display = 'flex';

  // Auto-load the Gemini prompt with candidate data
  if (!hasGemini) loadPromptPreview();
}

async function loadPromptPreview() {
  const transcript = document.getElementById('modalTranscript').value.trim();
  const promptEl = document.getElementById('modalPrompt');
  promptEl.value = 'Loading...';
  try {
    const res = await fetch('/api/build-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        answerSheetData: currentCandidate.answerData || { candidateEmail: currentCandidate.email },
        transcript: transcript || '',
      }),
    });
    const data = await res.json();
    promptEl.value = data.prompt || 'Failed to build prompt';
  } catch (e) {
    promptEl.value = 'Error: ' + e.message;
  }
}

function closeModal() {
  document.getElementById('candidateModal').style.display = 'none';
  currentCandidate = null;
}

async function saveManualScore() {
  const score = document.getElementById('manualScore').value.trim();
  if (!score || isNaN(score) || score < 0 || score > 100) {
    alert('Enter a score between 0 and 100.'); return;
  }
  const statusEl = document.getElementById('modalStatus');
  statusEl.innerHTML = '<div class="loading"><div class="spinner"></div>Saving...</div>';
  try {
    const res = await fetch('/api/update-score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: currentCandidate.email, score: parseFloat(score) }),
    });
    const data = await res.json();
    if (data.success) {
      statusEl.innerHTML = '<div style="color:#2e7d32;font-weight:600">Score saved successfully.</div>';
      loadCandidates();
    } else {
      statusEl.innerHTML = '<div style="color:#c62828">Error: ' + (data.error || 'Unknown') + '</div>';
    }
  } catch (e) {
    statusEl.innerHTML = '<div style="color:#c62828">Error: ' + e.message + '</div>';
  }
}

async function sendModalToGemini() {
  const transcript = document.getElementById('modalTranscript').value.trim();
  if (!transcript) { alert('Paste the transcript first.'); return; }

  const customPrompt = document.getElementById('modalPrompt').value.trim();

  const statusEl = document.getElementById('modalStatus');
  statusEl.innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing with Gemini... 30-60 seconds.</div>';

  try {
    const answerSheetData = currentCandidate.answerData || { candidateEmail: currentCandidate.email };

    const body = {
      answerSheetData,
      transcript,
      candidateName: currentCandidate.name,
      position: currentCandidate.position,
      assessorName: currentCandidate.assessor,
    };
    if (customPrompt) body.customPrompt = customPrompt;

    const res = await fetch('/api/score-gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    if (data.error) {
      statusEl.innerHTML = `<div class="alert-box">Error: ${data.error}</div>`;
      return;
    }

    statusEl.innerHTML = '<div style="color:var(--success);font-weight:600">Analysis complete!</div>';
    const report = data.geminiReport;
    document.getElementById('modalResults').innerHTML = report
      ? `<div style="font-size:28px;font-weight:700;color:var(--primary);margin:8px 0">Gemini Score: ${report.final_score ?? 'N/A'}</div>
         ${report.narrative_summary ? `<p style="margin:8px 0">${report.narrative_summary}</p>` : ''}
         ${report.hiring_recommendation ? `<p><strong>Recommendation:</strong> ${report.hiring_recommendation}</p>` : ''}
         <details style="margin-top:8px"><summary style="cursor:pointer;color:var(--muted)">Full JSON</summary><pre style="font-size:11px;overflow:auto;max-height:300px">${JSON.stringify(report, null, 2)}</pre></details>`
      : `<pre style="font-size:12px;overflow:auto;max-height:400px">${data.rawResponse}</pre>`;

    // Hide the send form
    document.getElementById('modalGeminiSection').style.display = 'none';

    loadCandidates();
  } catch (err) {
    statusEl.innerHTML = `<div class="alert-box">Failed: ${err.message}</div>`;
  }
}

loadCandidates();
</script>

</body>
</html>
